<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vulnerability Scanner</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="main">
        <div id="header">
            <h1>Vulnerability Scanner</h1>
            <p>Scan your GitHub projects, requirements.txt or package.json for package vulnerabilities.</p>
        </div>
        <div id="request-form">
            <label for="github-url-input">GitHub URL</label>
            <input id="github-url-input" type="text">
            <label for="file-input">Files</label>
            <input id="file-input" type="file" multiple accept=".txt, .json">
            <button id="submit">Check for Vulnerabilities</button>
        </div>
        <div id="response-content"></div>
    </div>
    <script src="scripts.js"></script>
</body>
</html>
